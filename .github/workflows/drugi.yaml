name: drugi
on:
  issues:
    types: [closed]
jobs:
  posal:
    runs-on: ubuntu-latest
    steps:
      - name: Update GitHub Profile README
        uses: theboi/github-update-readme@v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          footer: "Last issue closed by: ${{ github.actor }}"
